; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; N16R8: 16 MB flash, 8 MB octal PSRAM
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; This board's USB-C port is bridged to UART0 by an external CH343 chip
; (confirmed via lsusb: QinHeng/WCH USB Single Serial, /dev/ttyACM0), not
; the ESP32-S3's native USB-OTG peripheral. ARDUINO_USB_MODE=0 keeps
; Serial on UART0 so output reaches this port; USB_CDC_ON_BOOT would
; instead redirect Serial to native USB pins (GPIO19/20), which are not
; wired to a connector on this board and would produce no output here.
; NOTE: the board default already defines ARDUINO_USB_MODE=1; this override
; produces a harmless "redefined" compiler warning. The later -D wins, so
; the effective value is 0 (verified via compile_commands.json).
build_flags =
    -DARDUINO_USB_MODE=0
    -DBOARD_HAS_PSRAM

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.15.5
